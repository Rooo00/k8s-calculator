apiVersion: apps/v1
kind: Deployment
metadata:
  name: calculator-deployment
  labels:
    app: k8s-calculator
spec:
  replicas: 1 
  selector:
    matchLabels:
      app: k8s-calculator
  template:
    metadata:
      labels:
        app: k8s-calculator
    spec:
      containers:
      - name: calculator
        image: roo00oo/k8s-calculator:latest 
        ports:
        - containerPort: 5000